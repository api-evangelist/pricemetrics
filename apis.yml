apis:
  - aid: pricemetrics:pricemetrics-pricing-api
    name: PriceMetrics Pricing API
    description: >-
      The PriceMetrics Pricing API provides programmatic access to price
      optimization recommendations, competitive price tracking, elasticity
      analysis, and revenue optimization insights. Clients submit transaction
      and product data to receive profit-maximizing price recommendations with
      transparent reasoning, what-if scenario modeling, and competitive
      constraint analysis.
